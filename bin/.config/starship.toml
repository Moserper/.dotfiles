# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true
right_format = "$time"

[directory]
home_symbol = "ΎΤΚ  ~"
# truncation_length = 0         # Setting to 0 means no truncation at all
truncation_length = 40
truncation_symbol = '...'
truncate_to_repo = false
style = "5"

# Replace the 'έζψ' symbol in the prompt with 'έηε'
[character]
success_symbol = "[έζψ](bold green)" # Matches P10k's green 'έζψ' for success
error_symbol = "[έζψ](bold red)"   # Matches P10k's red 'έζψ' for error
vicmd_symbol = "[έζχ](bold green)" # Matches P10k's 'έζχ' for vi command mode

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "2"
symbol = "ΎΕΥ  "

[git_status]
# format = """\
# ([$branch](green))\
# ([${tag_icon}${tag}](cyan))\
# ([${commit}](green))\
# ([:$remote_branch](green))\
# ([${stashed}](green))\
# ([${wip}](yellow))\
# (${ahead_behind})\
# (${push_ahead_behind})\
# ([${action}](red))\
# ([${conflicted}](red))\
# ([${staged}](yellow))\
# ([${modified}](yellow))\
# ([${untracked}](14))\
# ([${unknown}](yellow))"""

# format = """\
# ([$branch](green))\
# ([${tag_icon}${tag}](cyan))\
# ([${commit}](green))\
# ([:$remote_branch](green))\
# ([${wip}](yellow))\
# ([${stashed}](green))\
# ([${ahead_behind}](12))\
# ([${push_ahead_behind}](12))\
# ([${action}](red))\
# ([${conflicted}](red))\
# ([${staged}](yellow))\
# ([${modified}](yellow))\
# ([${untracked}](14))\
# ([${unknown}](yellow))"""



format = """\
([$branch](green))\
([${tag_icon}${tag}](#89dceb))\
([${commit}](green))\
([:$remote_branch](green))\
([${wip}](#fabd2f))\
([${stashed}](green))\
([${ahead_behind}](green))\
([${push_ahead_behind}](green))\
([${action}](#fb4934))\
([${conflicted}](#fb4934))\
([${staged}](#fabd2f))\
([${modified}](#fabd2f))\
([${untracked}](#89dceb))\
([${unknown}](##fabd2f))"""

stashed = "*${count} "          # Matches P10k: *42 if have stashes.
ahead = "ΎΒλ ${count} "            # Matches P10k: έΘκ42 if ahead
behind = "ΎΒμ ${count} "           # Matches P10k: έΘμ42 if behind
diverged = "ΎΒμ ${behind_count} ΎΒλ ${ahead_count} " # Matches P10k's έΘμ42έΘκ42 look
untracked = "?${count} "        # Matches P10k: ?42 if have untracked files.
staged = "+${count} "           # Matches P10k: +42 if have staged changes.
modified = "!${count} "         # Matches P10k: !42 if have unstaged changes.
conflicted = "~${count} "       # Matches P10k: ~42 if have merge conflicts.
renamed = "┬╗${count}"
deleted = "έεα${count}"

